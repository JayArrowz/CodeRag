services:
  dashboard:
    build:
      context: .
      dockerfile: src/CodeRag.Dashboard/Dockerfile
    environment:
      # ── Database ────────────────────────────────────────────────────────────
      CODERAG_Database__Provider: "${CODERAG_Database__Provider:-Postgres}"
      CODERAG_Database__ConnectionString: "${CODERAG_Database__ConnectionString:-Host=51.77.221.59;Database=coderag;Port=1688;Username=revelio-roo;Password=sadfasERE*22L;ConnectionLifeTime=60;}"
      # ── Embedding ───────────────────────────────────────────────────────────
      CODERAG_Embedding__Provider: "${CODERAG_Embedding__Provider:-Google}"
      CODERAG_Embedding__ApiKey: "${CODERAG_Embedding__ApiKey:-}"
      CODERAG_Embedding__Model: "${CODERAG_Embedding__Model:-models/gemini-embedding-001}"
      CODERAG_Embedding__Dimensions: "${CODERAG_Embedding__Dimensions:-3072}"
      # ── ASP.NET Core ────────────────────────────────────────────────────────
      ASPNETCORE_ENVIRONMENT: Production
      # ── Persistence ─────────────────────────────────────────────────────────
      # Watches are stored in the named volume below so they survive restarts.
      CODERAG_WatchesFile: /data/watches.json
    ports:
      - "5180:8080"
    volumes:
      # Mount source folders you want to index from the dashboard.
      # Paths typed in the Index page must exist *inside* the container.
      - ./:/workspace:ro
      # Persistent watch store — survives container restarts.
      - watches-data:/data

volumes:
  watches-data:
